    <!--
      Structured Data — WebSite + SearchAction
      Enables Google Sitelinks Search Box. Search URL pattern is prepared for a
      future /search?q= route; until then Google simply falls back to surfacing
      internal results via the standard site: operator.
    -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "@id": "https://urbanehaauz.com/#website",
      "url": "https://urbanehaauz.com/",
      "name": "Urbane Haauz",
      "alternateName": "Urbane Haauz Boutique Hotel",
      "publisher": {"@id": "https://urbanehaauz.com/#organization"},
      "inLanguage": ["en-IN", "hi-IN"],
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://urbanehaauz.com/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

      default-hero case is substantial.
    -->
    <link rel="preload" as="image" href="/lib/hero-image.jpg" fetchpriority="high" />
